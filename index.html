<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape: Road to Graduation 🏴‍☠️🎓</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1e272e; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background-color: #2c3e50; padding: 30px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; width: 90%; border: 3px solid #f39c12; display: none; text-align: center; color: #d2dae2; }
        #opening-section { display: block; }
        .map-img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 15px; margin: 10px 0; }
        h2 { margin: 0 0 10px 0; font-size: 24px; color: #f1c40f; }
        button { border: none; padding: 12px 20px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; margin-top: 10px; width: 100%; transition: 0.2s; }
        .btn-start { background-color: #8e44ad; }
        .btn-answer { background-color: #27ae60; }
        .btn-clue { background-color: #2980b9; }
        .reward-board { background: #34495e; padding: 10px; border-radius: 8px; font-size: 18px; letter-spacing: 3px; color: #f1c40f; margin-bottom: 15px; }
        .riddle-box { background: #ecf0f1; color: #2c3e50; padding: 15px; border-radius: 10px; font-size: 16px; margin-bottom: 15px; }
        input[type="text"] { width: 90%; padding: 10px; border: 2px solid #bdc3c7; border-radius: 6px; font-size: 16px; margin-bottom: 10px; text-align: center; text-transform: uppercase; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #2c3e50; border: 3px solid #f1c40f; padding: 20px; border-radius: 20px; width: 80%; max-width: 300px; text-align: center; }
        .char-img { width: 140px; height: 140px; object-fit: cover; border-radius: 50%; border: 4px solid #3498db; margin: 15px 0; background-color: #ecf0f1; }
        
        /* Slideshow Modern Minimalist */
        .slideshow-container { position: relative; max-width: 100%; height: 300px; margin: 15px 0; overflow: hidden; }
        .mySlides { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; border: none; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            opacity: 0; transition: opacity 1.5s ease-in-out; display: none;
        }
        .mySlides.active { opacity: 1; display: block; }
    </style>
</head>
<body>

    <div class="container" id="opening-section">
        <h2 style="margin-top: 0;">SOS! Misi Penyelamatan</h2>
        <p>"Nampaknya kita harus berpetualang untuk menyelamatkan Endang dari belenggu ini..."</p>
        <img src="map_riddle.png" alt="Peta" class="map-img">
        <button class="btn-start" onclick="startGame()">Mulai Petualangan ⚔️</button>
    </div>

    <div class="container" id="game-section">
        <div class="reward-board" id="reward-display">_ _ _ _ _ _ _ _ _ _ _ _ _ _ _</div>
        <h3 id="level-title" style="margin: 5px 0;">Level 1</h3>
        <div class="riddle-box" id="question-text">Loading...</div>
        <input type="text" id="answer-input" placeholder="Jawaban..." onkeypress="if(event.key==='Enter') checkAnswer()">
        <div>
            <button class="btn-answer" onclick="checkAnswer()">Jawab!</button>
            <button class="btn-clue" onclick="showClue()">Clue</button>
        </div>
        <p id="error-msg" style="color: #e74c3c; display: none; font-size: 12px; margin-top: 10px;">Salah! Coba lagi.</p>
    </div>

    <div class="modal-overlay" id="reward-modal">
        <div class="modal-content">
            <h3 style="color: #2ecc71; margin-top: 0;">Level Selesai! 🎉</h3>
            <div id="modal-letter" style="font-size: 40px; color: #e74c3c; font-weight: bold;">A</div>
            <img id="modal-char-img" src="" alt="Karakter" class="char-img">
            <h4 id="modal-char-name" style="margin: 5px 0; color: white;">Nama</h4>
            <button onclick="nextLevel()" style="background: #f39c12;">Lanjut!</button>
        </div>
    </div>

    <div class="container" id="ending-section">
        <h1 style="font-size: 24px;">HAPPY GRADUATION! 🎉</h1>
        <div class="slideshow-container">
            <img class="mySlides active" src="foto_1.png" alt="Memory 1">
            <img class="mySlides" src="foto_2.jpg" alt="Memory 2">
            <img class="mySlides" src="foto_3.jpg" alt="Memory 3">
            <img class="mySlides" src="foto_4.jpg" alt="Memory 4">
            <img class="mySlides" src="foto_5.jpg" alt="Memory 5">
            <img class="mySlides" src="foto_6.jpg" alt="Memory 6">
            <img class="mySlides" src="foto_7.jpg" alt="Memory 7">
            <img class="mySlides" src="foto_8.jpg" alt="Memory 8">
            <img class="mySlides" src="foto_9.jpg" alt="Memory 9">
            <img class="mySlides" src="foto_10.jpg" alt="Memory 10">
            <img class="mySlides" src="foto_11.jpg" alt="Memory 11">
            <img class="mySlides" src="foto_12.jpg" alt="Memory 12">
            <img class="mySlides" src="foto_13.jpg" alt="Memory 13">
            <img class="mySlides" src="foto_14.jpg" alt="Memory 14">
            <img class="mySlides" src="foto_15.png" alt="Memory 15">
            <img class="mySlides" src="foto_16.png" alt="Memory 16">
            <img class="mySlides" src="foto_17.jpeg" alt="Memory 17">
            <img class="mySlides" src="foto_18.jpeg" alt="Memory 18">
            <img class="mySlides" src="foto_19.jpeg" alt="Memory 19">
        </div>
        <audio id="bg-music" src="memories.mp3" loop></audio>
    </div>

    <script>
        const levels = [
            { q: "Selalu datang, tapi tidak pernah tiba. Siapakah aku?", a: "besok", clues: ["Berkaitan dengan waktu", "Sangat dinantikan", "Bukan hari ini", "Bukan juga lusa", "Hari setelah hari ini"], extra: "B-E-S-O-K" },
            { q: "Punya kota tapi tak ada rumah, punya laut tapi tak ada air. Apakah aku?", a: "peta", clues: ["Benda mati", "Biasanya dari kertas", "Penunjuk arah", "Dibawa bajak laut", "Sering dibawa Dora the Explorer"], extra: "P-E-T-A" },
            { q: "Aku baru berguna kalau sudah dipecahkan. Apakah aku?", a: "telur", clues: ["Bahan makanan", "Bentuknya oval", "Punya cangkang pelindung", "Dihasilkan oleh unggas", "Enak didadar atau diceplok"], extra: "T-E-L-U-R" },
            { q: "Semakin banyak yang ada, semakin sedikit yang bisa kamu lihat. Apakah itu?", a: "gelap", clues: ["Sebuah kondisi", "Kebalikan dari terang", "Terjadi di malam hari", "Membuatmu butuh senter", "Saat mati listrik pasti terjadi ini"], extra: "G-E-L-A-P" },
            { q: "Bisa ditangkap tapi tidak bisa dilempar. Apakah itu?", a: "flu", clues: ["Berkaitan dengan kesehatan", "Bikin kepala pusing", "Disebabkan virus", "Sering terjadi di musim hujan", "Bikin hidung meler dan bersin"], extra: "F-L-U" },
            { q: "Punya satu mata, tapi tidak bisa melihat. Apakah aku?", a: "jarum", clues: ["Benda kecil", "Ujungnya tajam", "Punya lubang ('mata')", "Temannya benang", "Alat untuk menjahit"], extra: "J-A-R-U-M" },
            { q: "Berjalan tanpa kaki, menangis tanpa mata. Siapakah aku?", a: "awan", clues: ["Ada di langit", "Ukurannya besar", "Bisa bergerak ditiup angin", "Warnanya putih atau abu-abu", "Tangisannya adalah hujan"], extra: "A-W-A-N" },
            { q: "Aku tinggi saat muda, dan pendek saat tua. Apakah aku?", a: "lilin", clues: ["Benda padat", "Sumber cahaya darurat", "Punya sumbu di tengahnya", "Menyusut karena panas", "Ditiup saat ulang tahun"], extra: "L-I-L-I-N" },
            { q: "Hewan apa yang paling kaya raya di dunia?", a: "beruang", clues: ["Tebak-tebakan receh", "Hewan bertubuh besar", "Suka makan madu", "Berbulu lebat", "Plesetan dari kata 'Punya Uang'"], extra: "B-E-R-U-A-N-G" },
            { q: "Angka berapa yang jika dibalik nilainya malah bertambah besar?", a: "enam", clues: ["Ini soal logika matematika", "Bukan huruf", "Angkanya di bawah sepuluh", "Bulatannya ada di bawah", "Kalau dibalik jadi sembilan"], extra: "E-N-A-M" },
            { q: "Berlubang di mana-mana, tapi tetap bisa menahan air. Apakah aku?", a: "spons", clues: ["Alat kebersihan", "Ada di dapur", "Temannya sabun cuci", "Bisa menyerap cairan", "Benda aslinya SpongeBob"], extra: "S-P-O-N-S" },
            { q: "Punya leher tapi tak punya kepala, punya dua lengan tapi tak punya jari. Apakah aku?", a: "kemeja", clues: ["Barang yang dipakai", "Ada kerahnya", "Bisa dilipat", "Punya kancing di depan", "Pakaian atasan berkerah"], extra: "K-E-M-E-J-A" },
            { q: "Jika kamu memilikiku, kamu ingin membagiku. Jika dibagikan, kamu tidak memilikiku lagi. Apa itu?", a: "rahasia", clues: ["Bukan benda fisik", "Sebuah informasi rahasia", "Sering diceritakan teman (gosip)", "Biasanya diikuti kata 'jangan billing siapa-siapa ya'", "Sesuatu yang harusnya disimpan sendiri"], extra: "R-A-H-A-S-I-A" },
            { q: "Benda apa yang selalu maju dan tidak pernah bisa mundur sedikitpun?", a: "umur", clues: ["Tidak terlihat tapi pasti", "Berjalan bersama waktu", "Bertambah setiap tahun", "Membuatmu makin dewasa", "Dirayakan setahun sekali"], extra: "U-M-U-R" },
            { q: "Hanya bisa hidup jika diberi makan, tapi akan mati jika diberi minum. Apakah aku?", a: "api", clues: ["Menghasilkan suhu panas", "Warnanya merah, oranye, biru", "Makanannya adalah kayu/oksigen", "Takut banget sama air", "Dibutuhkan untuk memasak"], extra: "A-P-I" }
        ];

        const opCharacters = [
            { name: "Luffy", img: "image_1.webp" }, { name: "Zoro", img: "image_2.webp" }, { name: "Nami", img: "image_3.webp" },
            { name: "Usopp", img: "image_4.webp" }, { name: "Sanji", img: "image_14.webp" }, { name: "Chopper", img: "image_5.webp" },
            { name: "Robin", img: "image_6.webp" }, { name: "Franky", img: "image_7.webp" }, { name: "Brook", img: "image_8.webp" },
            { name: "Jinbe", img: "image_9.webp" }, { name: "Law", img: "image_10.webp" }, { name: "Ace", img: "image_11.webp" },
            { name: "Sabo", img: "image_12.webp" }, { name: "Shanks", img: "image_13.jpg" }, { name: "Boa Hancock", img: "image_15.webp" }
        ];

        const targetWord = "HAPPYGRADUATION".split('');
        let shuffledIndices = Array.from({length: 15}, (_, i) => i).sort(() => Math.random() - 0.5);
        let revealedPositions = [];
        let currentLevel = 0;
        let cluesRevealed = 0;
        let slideIndex = 0;
        let slideshowTimer;

        function startGame() { 
            document.getElementById("opening-section").style.display = "none"; 
            document.getElementById("game-section").style.display = "block"; 
            updateRewardBoard(); 
            document.getElementById("question-text").innerText = levels[0].q;
        }

        function updateRewardBoard() {
            let boardHTML = "";
            for (let i = 0; i < targetWord.length; i++) {
                if (i === 5) boardHTML += "&nbsp;&nbsp;&nbsp;";
                boardHTML += revealedPositions.includes(i) ? targetWord[i] + " " : "_ ";
            }
            document.getElementById("reward-display").innerHTML = boardHTML;
        }

        function checkAnswer() {
            const userAnswer = document.getElementById("answer-input").value.toLowerCase().trim();
            const levelData = levels[currentLevel];
            if (userAnswer === levelData.a || (levelData.a === 'kemeja' && userAnswer === 'baju') || (levelData.a === 'umur' && userAnswer === 'usia') || (levelData.a === 'flu' && userAnswer === 'pilek')) {
                revealedPositions.push(shuffledIndices[currentLevel]);
                document.getElementById('modal-letter').innerText = targetWord[shuffledIndices[currentLevel]];
                document.getElementById('modal-char-img').src = opCharacters[currentLevel].img;
                document.getElementById('modal-char-name').innerText = opCharacters[currentLevel].name;
                document.getElementById('reward-modal').style.display = "flex";
            } else { document.getElementById("error-msg").style.display = "block"; }
        }

        function nextLevel() {
            document.getElementById('reward-modal').style.display = "none";
            updateRewardBoard();
            currentLevel++;
            if (currentLevel >= levels.length) {
                document.getElementById("game-section").style.display = "none";
                document.getElementById("ending-section").style.display = "block";
                document.getElementById("bg-music").play();
                startSlideshow();
            } else {
                document.getElementById("level-title").innerText = "Level " + (currentLevel + 1);
                document.getElementById("question-text").innerText = levels[currentLevel].q;
                document.getElementById("answer-input").value = "";
                document.getElementById("error-msg").style.display = "none";
                cluesRevealed = 0;
            }
        }

        function showClue() {
            if (cluesRevealed < 5) {
                alert("Clue: " + levels[currentLevel].clues[cluesRevealed]);
                cluesRevealed++;
            } else {
                let nyanyi = prompt("Wajib nyanyi 'Balonku Ada Lima'! Ketik lirik baris kedua (4 kata):");
                if (nyanyi && nyanyi.toLowerCase().includes("rupa")) alert("Clue sakti: " + levels[currentLevel].extra);
                else alert("Salah lirik! Ayo nyanyi lagi.");
            }
        }

        function startSlideshow() {
            let slides = document.getElementsByClassName("mySlides");
            if (slides.length === 0) return;
            
            if(slideshowTimer) clearTimeout(slideshowTimer);

            for (let i = 0; i < slides.length; i++) { 
                slides[i].classList.remove("active"); 
            }
            
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            
            slides[slideIndex-1].classList.add("active");
            slideshowTimer = setTimeout(startSlideshow, 3000);
        }
    </script>
</body>
</html>
